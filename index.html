<!DOCTYPE html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RPGNEP Ultimate - Gerenciador D&D 5e</title>
    <link rel="icon" href="/favicon.png" />
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Scripts externos para Google Drive -->
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
      body { background-color: #0c0a09; color: #e7e5e4; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; touch-action: manipulation; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #1c1917; }
      ::-webkit-scrollbar-thumb { background: #44403c; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #d97706; }
      .custom-scrollbar { scrollbar-width: thin; scrollbar-color: #44403c #1c1917; }
      
      .font-cinzel { font-family: 'Cinzel', serif; }
      
      /* Animações suaves */
      .animate-in { animation: fadeIn 0.3s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
      
      .slide-in-from-right { animation: slideRight 0.3s ease-out; }
      @keyframes slideRight { from { transform: translateX(100%); } to { transform: translateX(0); } }

      /* Checkerboard bg para editor */
      .checkerboard-bg {
        background-image: linear-gradient(45deg, #111 25%, transparent 25%), 
                          linear-gradient(-45deg, #111 25%, transparent 25%), 
                          linear-gradient(45deg, transparent 75%, #111 75%), 
                          linear-gradient(-45deg, transparent 75%, #111 75%);
        background-size: 20px 20px;
        background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      }

      /* HUD Styles */
      .hud-glass .hud-panel {
        background-color: rgba(28, 25, 23, 0.8) !important;
        backdrop-filter: blur(12px) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important;
      }

      .hud-solid .hud-panel {
        background-color: #121212 !important;
        border: 1px solid #292524 !important;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5) !important;
      }

      .hud-minimal .hud-panel {
        background-color: transparent !important;
        border: none !important;
        box-shadow: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
